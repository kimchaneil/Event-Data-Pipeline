services:
  postgres:
    image: postgres:16
    container_name: gen-event-postgres
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: commerce_events
      POSTGRES_USER: commerce_admin
      POSTGRES_PASSWORD: commerce_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commerce_admin -d commerce_events"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gen-event-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: commerce_events
      POSTGRES_USER: commerce_admin
      POSTGRES_PASSWORD: commerce_password
      POSTGRES_TABLE: event_logs
      RANDOM_BATCH_SIZE: 50
      AUTO_GENERATE_ENABLED: true
      AUTO_GENERATE_BATCH_SIZE: 50
      POSTGRES_CONNECT_RETRIES: 30
      POSTGRES_CONNECT_RETRY_SECONDS: 2
    command: ["python", "-m", "gen_event.scripts.run_api"]
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gen-event-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      STREAMLIT_HOST: 0.0.0.0
      STREAMLIT_PORT: 8501
      API_BASE_URL: http://api:8000
      RANDOM_BATCH_SIZE: 50
    command: ["python", "-m", "gen_event.scripts.run_streamlit"]
    ports:
      - "8501:8501"

  visual:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gen-event-visual
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: commerce_events
      POSTGRES_USER: commerce_admin
      POSTGRES_PASSWORD: commerce_password
      POSTGRES_TABLE: event_logs
      POSTGRES_CONNECT_RETRIES: 30
      POSTGRES_CONNECT_RETRY_SECONDS: 2
    command: ["python", "-m", "visual.generate_charts"]
    volumes:
      - ./visual/output:/app/visual/output

volumes:
  postgres_data:
